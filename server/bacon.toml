# Trigger-file dev loop for the tengri-server.
#
# Run `bacon` (no args) in this directory. The server is only rebuilt +
# restarted when the `.restart` file's *content* changes — not on every .rs
# save. To rebuild, run `date +%s > server/.restart` after a batch of edits.
# (Plain `touch` won't do: FSEvents on macOS coalesces pure mtime updates of
# empty files and the event never reaches bacon.)
#
# This avoids the usual save-watcher pattern, which churns through compile
# errors mid-refactor when the tree is briefly non-compiling between file edits.

default_job = "serve"

# Global watch settings — apply to every job, including bacon's built-in
# `check`/`clippy`/`test`/`run` jobs. Even if a stray keypress switches the
# active job, no job auto-watches `src/`. The only file that ever triggers a job
# is `.restart`. If you want `cargo check` ambient, run it yourself in another
# terminal.
default_watch = false
watch = [".restart"]
# `.restart` is gitignored; bacon would otherwise skip changes to ignored
# files.
apply_gitignore = false

# Neuter the default keybindings that silently switch jobs and stop the
# server. Without this, pressing `c` or `ctrl-j` swaps bacon to a
# different job (killing the running tengri-server) and there's no
# obvious way back.
[keybindings]
c = "no-op" # default: job:clippy-all
ctrl-j = "no-op" # default: open-jobs-menu

[jobs.serve]
command = ["cargo", "run", "--bin", "tengri-server"]
need_stdout = true
background = false
allow_warnings = true
show_command_error_code = true

on_change_strategy = "kill_then_restart"

# SIGINT (not the default SIGKILL) so `shutdown_signal` in `main.rs` runs:
# axum drains in-flight requests and the TCP listener is released cleanly.
kill = ["kill", "-s", "INT"]
